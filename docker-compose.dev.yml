services:
  postgres:
    image: postgres:17-alpine
    container_name: vk-edu-quiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
      POSTGRES_DB: quiz_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quiz_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
